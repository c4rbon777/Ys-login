<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ys Giriş</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; background-color: #0d1117; 
        }
        .card { 
            background: white; padding: 25px; border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); text-align: center;
            width: 85%; max-width: 350px; 
        }
        h2 { margin: 0 0 15px 0; font-size: 1.2em; color: #000; }
        
        /* IP alanı ve Giriş alanı stilleri */
        .input-group { margin-bottom: 15px; text-align: left; }
        label { font-size: 0.8em; color: #666; font-weight: bold; }
        input { 
            width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc;
            border-radius: 5px; box-sizing: border-box; font-family: monospace;
        }

        .btn {
            display: block; width: 100%; padding: 12px; margin-top: 10px;
            background-color: #007bff; color: white;
            border: none; border-radius: 5px; font-weight: bold;
            text-decoration: none; cursor: pointer; text-align: center;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Ys Giriş</h2>
        
        <div class="input-group">
            <label>Güncel IP (Token):</label>
            <input type="text" id="token-input" placeholder="IP yükleniyor...">
        </div>

        <a id="yonlendir" href="#" class="btn" onclick="tiklandiginda()">Uygulamaya Git</a>
    </div>

    <script>
        // IP adresini çek ve input alanına yerleştir
        async function ipGetir() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                document.getElementById('token-input').value = data.ip;
            } catch (e) {
                document.getElementById('token-input').placeholder = "Hata oluştu.";
            }
        }

        // Butona tıklandığında input içindeki değeri alıp yönlendir
        function tiklandiginda() {
            const token = document.getElementById('token-input').value;
            const link = `kuppoys://login?token=${token}`;
            window.location.href = link;
        }

        // Sayfa açıldığında IP'yi çek
        ipGetir();
    </script>
</body>
</html>
