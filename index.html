<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ys Giriş Paneli</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #0d1117; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #ffffff; color: #333; padding: 25px; border-radius: 12px; width: 85%; max-width: 350px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); text-align: center; }
        #parola-ekrani { display: block; }
        #panel-ekrani { display: none; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn { display: block; width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .ip-box { background: #f0f4f8; padding: 10px; border-radius: 6px; font-family: monospace; color: #d9534f; margin: 10px 0; border: 1px solid #ccd6dd; }
        hr { border: 0; border-top: 1px solid #ddd; margin: 20px 0; }
    </style>
</head>
<body>

<div class="card" id="parola-ekrani">
    <h2>Erişim Parolası</h2>
    <input type="password" id="parola-input" placeholder="Parolayı girin...">
    <button class="btn" onclick="parolaKontrol()">Giriş Yap</button>
</div>

<div class="card" id="panel-ekrani">
    <h2>Güncel IP</h2>
    <div class="ip-box" id="ip-adresi">Yükleniyor...</div>
    <hr>
    <h2>Token ile Giriş</h2>
    <input type="text" id="manuel-token" placeholder="Token kodunu gir...">
    <button class="btn" onclick="manuelYonlendir()">Uygulamaya Git</button>
</div>

<script>
    // 'ün SHA-256 özeti
    const HASHED_PASS = "4e18374d812328014526017b2b1a8d0554c3752e256b9c9f7a637d6e87f6540c";

    async function sha256(message) {
        const msgBuffer = new TextEncoder().encode(message);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function parolaKontrol() {
        const girilen = document.getElementById('parola-input').value;
        const girilenHash = await sha256(girilen);
        
        if (girilenHash === HASHED_PASS) {
            document.getElementById('parola-ekrani').style.display = 'none';
            document.getElementById('panel-ekrani').style.display = 'block';
            ipKontrolEt();
        } else {
            alert("Hatalı parola!");
        }
    }

    // ... (IP Kontrol ve Manuel Yönlendirme kodları aynı kalıyor)
    async function ipKontrolEt() {
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            document.getElementById('ip-adresi').innerText = data.ip;
        } catch(e) { document.getElementById('ip-adresi').innerText = "Hata!"; }
    }

    function manuelYonlendir() {
        const token = document.getElementById('manuel-token').value;
        if(token) window.location.href = `kuppoys://login?token=${token}`;
    }
</script>

</body>
</html>
