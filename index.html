<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ys Giriş</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; background-color: #0d1117; 
        }
        .card { 
            background: white; padding: 30px 20px; border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); text-align: center;
            width: 85%; max-width: 350px; 
        }
        h2 { margin: 0 0 15px 0; font-size: 1.2em; color: #000; }
        #ip-kutusu { 
            background: #f0f4f8; padding: 10px; border: 1px solid #ccd6dd;
            border-radius: 6px; font-family: monospace; font-size: 0.9em;
            color: #333; margin-bottom: 20px; word-break: break-all;
        }
        .btn {
            display: block; width: 100%; padding: 12px;
            background-color: #007bff; color: white;
            border: none; border-radius: 5px; font-weight: bold;
            text-decoration: none; cursor: pointer;
        }
        .durum { margin-top: 15px; font-size: 0.85em; color: #666; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Ys Giriş</h2>
        <div id="ip-kutusu">IP alınıyor...</div>
        <a id="yonlendir" href="#" class="btn">Uygulamaya Git</a>
        <p class="durum">Uygulama açılıyor...</p>
    </div>

    <script>
        let guncelIp = "";

        async function ipGuncelle() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                guncelIp = data.ip;
                
                document.getElementById('ip-kutusu').innerText = guncelIp;
                
                // Yönlendirme linkini oluştur: kuppoys://login?token=IP_ADRESI
                const link = `kuppoys://login?token=${guncelIp}`;
                document.getElementById('yonlendir').href = link;
                
            } catch (e) {
                document.getElementById('ip-kutusu').innerText = "Bağlantı hatası!";
            }
        }

        // Sayfa yüklendiğinde çalıştır
        ipGuncelle();
    </script>
</body>
</html>
