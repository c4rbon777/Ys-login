<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ys Giriş Paneli</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #0d1117; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #ffffff; color: #333; padding: 25px; border-radius: 12px; width: 85%; max-width: 350px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        h2 { margin-top: 0; font-size: 1.2em; text-align: center; }
        .ip-box { background: #f0f4f8; padding: 10px; border-radius: 6px; text-align: center; font-family: monospace; font-size: 1.1em; color: #d9534f; margin-bottom: 20px; border: 1px solid #ccd6dd; }
        hr { border: 0; border-top: 1px solid #ddd; margin: 20px 0; }
        .manual-motor label { font-size: 0.8em; color: #666; font-weight: bold; }
        .manual-motor input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn { display: block; width: 100%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; text-align: center; text-decoration: none; margin-bottom: 10px; }
        .btn-gray { background-color: #6c757d; }
        
        /* Modal Stilleri */
        #gecmis-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:1000; justify-content:center; align-items:center; }
        .modal-card { background: #fff; padding: 20px; border-radius: 12px; width: 85%; max-width: 350px; position: relative; color: #333; }
        .close-btn { position: absolute; top: 10px; right: 15px; cursor: pointer; font-size: 24px; font-weight: bold; color: #333; }
        #gecmis-liste { max-height: 300px; overflow-y: auto; margin-top: 15px; font-size: 0.85em; }
        .del-btn { color: #dc3545; cursor: pointer; font-weight: bold; margin-left: 10px; border: 1px solid #dc3545; padding: 2px 6px; border-radius: 4px; font-size: 0.7em; }
    </style>
</head>
<body>

<div class="card">
    <h2>Güncel IP</h2>
    <div class="ip-box" id="ip-adresi">Yükleniyor...</div>
    <hr>
    <div class="manual-motor">
        <h2>Ys'ye Token ile Giriş</h2>
        <label>Token Giriniz:</label>
        <input type="text" id="manuel-token" placeholder="Token kodunu buraya gir...">
        <button class="btn" onclick="kaydetVeYonlendir()">Uygulamaya Git</button>
        <button class="btn btn-gray" onclick="modalAc()">Geçmişi Görüntüle</button>
    </div>
</div>

<div id="gecmis-modal">
    <div class="modal-card">
        <span class="close-btn" onclick="modalKapat()">&times;</span>
        <h2>Geçmiş Girişler</h2>
        <div id="gecmis-liste"></div>
        <button class="btn btn-gray" style="margin-top: 15px; font-size: 0.8em; padding: 8px; width: 100%;" onclick="gecmisiTemizle()">Tüm Geçmişi Temizle</button>
    </div>
</div>

<script>
    let guncelIP = "Bilinmiyor";

    // IP'yi çek
    async function ipKontrolEt() {
        try {
            const response = await fetch('https://api.ipify.org?format=json');
            const data = await response.json();
            guncelIP = data.ip;
            document.getElementById('ip-adresi').innerText = guncelIP;
        } catch (e) { document.getElementById('ip-adresi').innerText = "Hata!"; }
    }
    ipKontrolEt();

    // Giriş yap ve sınırsız kaydet
    function kaydetVeYonlendir() {
        const tokenDegeri = document.getElementById('manuel-token').value;
        if(tokenDegeri) {
            const simdi = new Date().toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: '2-digit' });
            let gecmis = JSON.parse(localStorage.getItem('tokenGecmis') || '[]');
            gecmis.unshift({ zaman: simdi, token: tokenDegeri, ip: guncelIP });
            localStorage.setItem('tokenGecmis', JSON.stringify(gecmis));
            window.location.href = `kuppoys://login?token=${tokenDegeri}`;
        } else {
            alert("Lütfen geçerli bir token giriniz!");
        }
    }

    // Tekil satırı sil
    function satiriSil(index) {
        let gecmis = JSON.parse(localStorage.getItem('tokenGecmis') || '[]');
        gecmis.splice(index, 1);
        localStorage.setItem('tokenGecmis', JSON.stringify(gecmis));
        modalAc();
    }

    // Modal aç ve listeyi göster
    function modalAc() {
        const listeDiv = document.getElementById('gecmis-liste');
        const gecmis = JSON.parse(localStorage.getItem('tokenGecmis') || '[]');
        
        listeDiv.innerHTML = gecmis.length > 0 
            ? gecmis.map((item, index) => `
                <div style="border-bottom:1px solid #ddd; padding:10px 0;">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <b>${item.zaman}</b>
                        <span class="del-btn" onclick="satiriSil(${index})">Sil</span>
                    </div>
                    <div style="margin-top:5px; font-size: 0.9em;">IP: ${item.ip}</div>
                    <div style="margin-top:5px; word-break: break-all; background:#f8f9fa; padding:5px; border-radius:4px; font-family:monospace;">${item.token}</div>
                </div>`).join('')
            : "Henüz kayıt bulunmuyor.";
        document.getElementById('gecmis-modal').style.display = 'flex';
    }

    function modalKapat() {
        document.getElementById('gecmis-modal').style.display = 'none';
    }

    function gecmisiTemizle() {
        if(confirm("Tüm geçmişi silmek istediğine emin misin?")) {
            localStorage.removeItem('tokenGecmis');
            modalAc();
        }
    }
</script>

</body>
</html>
