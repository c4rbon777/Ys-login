<button class="btn" style="background-color: #6c757d; margin-top: 10px;" onclick="modalAc()">Geçmişi Görüntüle</button>

<div id="gecmis-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; justify-content:center; align-items:center;">
    <div class="card" style="position:relative;">
        <span onclick="modalKapat()" style="position:absolute; top:10px; right:15px; cursor:pointer; font-size:20px; color:#333;">&times;</span>
        <h2>Geçmiş Girişler</h2>
        <div id="gecmis-liste" style="max-height: 200px; overflow-y: auto; font-size: 0.85em;"></div>
    </div>
</div>

<script>
    // --- YENİ: GEÇMİŞİ KAYDET VE GÖSTER ---
    function manuelYonlendir() {
        const tokenDegeri = document.getElementById('manuel-token').value;
        if(tokenDegeri) {
            // Tarih ve Saat bilgisi
            const simdi = new Date().toLocaleString('tr-TR');
            const yeniGiris = { zaman: simdi, token: tokenDegeri };

            // LocalStorage'a kaydet
            let gecmis = JSON.parse(localStorage.getItem('tokenGecmis') || '[]');
            gecmis.push(yeniGiris);
            localStorage.setItem('tokenGecmis', JSON.stringify(gecmis));

            window.location.href = `://login?token=${tokenDegeri}`;
        } else {
            alert("Lütfen geçerli bir token giriniz!");
        }
    }

    function modalAc() {
        const listeDiv = document.getElementById('gecmis-liste');
        const gecmis = JSON.parse(localStorage.getItem('tokenGecmis') || '[]');
        
        listeDiv.innerHTML = gecmis.length > 0 
            ? gecmis.map(item => `<div style="border-bottom:1px solid #eee; padding:5px 0;"><b>${item.zaman}</b><br>Token: ${item.token.substring(0, 15)}...</div>`).join('')
            : "Henüz geçmiş kayıt yok.";
            
        document.getElementById('gecmis-modal').style.display = 'flex';
    }

    function modalKapat() {
        document.getElementById('gecmis-modal').style.display = 'none';
    }
</script>
